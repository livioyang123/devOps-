---
# Service Account for DevOps Platform Deployer
# This service account is used by the platform to deploy applications to Kubernetes
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-platform-deployer
  namespace: default
  labels:
    app: devops-platform
    component: deployer
---
# Service Account for DevOps Platform Monitor
# This service account is used by the platform to monitor applications
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-platform-monitor
  namespace: default
  labels:
    app: devops-platform
    component: monitor
